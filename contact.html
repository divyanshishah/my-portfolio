<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Contact | Divyanshi Shah</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">

    <div class="container">

        <a href="index.html" class="logo">
            Divyanshi Shah
        </a>

        <nav aria-label="Primary Navigation">
            <ul class="nav-links">

                <li><a href="index.html">Home</a></li>

                <li><a href="about.html">About</a></li>

                <li><a href="projects.html">Projects</a></li>

                <li>
                    <a
                        href="contact.html"
                        aria-current="page"
                    >
                        Contact
                    </a>
                </li>

            </ul>

        </nav>

    </div>

</header>

<main>

    <section class="page-section">

        <div class="container">

            <h1>
                Contact Me
            </h1>

            <form
                class="contact-form"
                aria-label="Contact Form"
            >

                <div class="form-group">

                    <label for="name">
                        Full Name
                    </label>

                    <input
                        type="text"
                        id="name"
                        required
                    >

                </div>

                <div class="form-group">

                    <label for="email">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="email"
                        required
                    >

                </div>

                <div class="form-group">

                    <label for="message">
                        Message
                    </label>

                    <textarea
                        id="message"
                        rows="5"
                        required
                    ></textarea>

                </div>

                <button
                    type="submit"
                    class="btn"
                    background-color="blue"
                >
                    Send Message
                </button>
            </form>
        </div>
    </section>

</main>

<footer class="footer">

    <p>
        Divyanshi Shah • BCA (AI & DS) Student
    </p>

</footer>

</body>

</html>
